apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-poller-deployment
  labels:
    name: db-poller-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-poller
  template:
    metadata:
      labels:
        app: db-poller
    spec:
      initContainers:
      - image: db-poller:latest
        name: db-migrate
        command: ["sh", "-c", "cd /app/packages/db-prisma && bunx prisma migrate deploy --config=/app/packages/db-prisma/prisma.config.ts"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database
              key: DATABASE_URL    
      containers:
      - image: db-poller:latest
        imagePullPolicy: IfNotPresent
        name: db-poller
        resources:
          limits:
            cpu: "500m"
            memory: "500Mi"
          requests:
            cpu: "250m"
            memory: "250Mi"
        livenessProbe:
          httpGet:
            path: /api/status/healthz
            port: 6000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/status/readyz
            port: 6000
          initialDelaySeconds: 30
          timeoutSeconds: 10
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: database
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt
              key: JWT_SECRET
        - name: ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt
              key: ADMIN_SECRET
        ports:
        - containerPort: 6000
          name: db-poller